version: "3.8"

services:
  auth_db:
    image: postgres:15
    container_name: my_db1
    env_file:
      - .env
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth_service:
    build: ./Auth-service
    container_name: my_fastapiapp
    ports:
      - "8001:8001"
    depends_on:
      auth_db:
        condition: service_healthy
    env_file:
      - .env